name: Build NorixOS

on:
  pull_request:
  push:
    paths-ignore:
      - '**/README.md'
  schedule:
    - cron: '10 00 * * *'
    - cron: '20 05 * * *'
    - cron: '30 10 * * *'
    - cron: '40 15 * * *'
    - cron: '50 20 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && 'full-pipeline' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}


jobs:
  build:
    uses: ./.github/workflows/.build.yml
    permissions:
      contents: read
      packages: write

  rechunk:
    needs: [build]
    uses: ./.github/workflows/.rechunk.yml
    permissions:
      contents: read

  push:
    needs: [rechunk]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    uses: ./.github/workflows/.push.yml
    permissions:
      contents: read
      packages: write
    secrets:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}

  verify:
    needs: [push]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    uses: ./.github/workflows/.verify.yml
    permissions:
      contents: read
      packages: read

  rollback:
    needs: [verify]
    if: always() && needs.verify.result == 'failure'
    uses: ./.github/workflows/.rollback.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit