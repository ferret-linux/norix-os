name: verify (internal)

on:
  workflow_call:

jobs:
  verify:
    name: Verify ${{ matrix.image_name }}
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: norix-os
          - image_name: norix-os-nvidia

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.3'

      - name: Verify Signature
        run: |
          for i in 1 2 3; do
            cosign verify \
              --key cosign.pub \
              ghcr.io/ferret-linux/${{ matrix.image_name }}:latest && break
            echo "Attempt $i/3 failed, retrying in 15s..."
            sleep 15
          done
        env:
          COSIGN_EXPERIMENTAL: false

      - name: Pull Image
        run: |
          for i in 1 2 3; do
            podman pull ghcr.io/ferret-linux/${{ matrix.image_name }}:latest && break
            echo "Attempt $i/3 failed, retrying in 15s..."
            sleep 15
          done

      - name: Run Image
        run: |
          podman run --rm ghcr.io/ferret-linux/${{ matrix.image_name }}:latest echo ok