---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>

####################
#### Image Info ####
####################
name: norix-os
description: NorixOS Linux image for Mesa GPUS
base-image: ghcr.io/ferret-linux/mink-os
image-version: 44
blue-build-tag: none
cosign-version: none
nushell-version: none
platforms:
  - linux/amd64
#################
#### MODULES ####
#################
modules:
## Import Modules/Scripts ##
  - from-file: build/configure/pre-setup.yml

  - from-file: build/install/xdg-base.yml
  - from-file: build/install/niri-base.yml
  - from-file: build/install/sddm.yml  
  - from-file: build/install/noctalia-shell.yml
  - from-file: build/install/niri-apps.yml
  - from-file: build/install/niri-input.yml

  - from-file: build/configure/norix-settings.yml
  - from-file: build/configure/post-setup.yml
  - from-file: build/configure/os-release.yml
